apiVersion: apps/v1
kind: Deployment
metadata:
  name: poultryguard-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poultryguard-grafana
  template:
    metadata:
      labels:
        app: poultryguard-grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
spec:
  selector:
    app: poultryguard-grafana
  ports:
    port: 3000
    targetPort: 3000
  type: LoadBalancer
