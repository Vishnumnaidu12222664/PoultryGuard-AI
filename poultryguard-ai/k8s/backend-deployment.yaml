apiVersion: apps/v1
kind: Deployment
metadata:
  name: poultryguard-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: poultryguard-backend
  template:
    metadata:
      labels:
        app: poultryguard-backend
    spec:
      containers:
      - name: backend
        image: poultryguard-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: MYSQL_SERVER
          value: mysql-service
        - name: REDIS_URL
          value: redis://redis-service:6379/0
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: poultryguard-backend
  ports:
    port: 8000
    targetPort: 8000
  type: ClusterIP
