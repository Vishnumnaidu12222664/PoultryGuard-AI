apiVersion: apps/v1
kind: Deployment
metadata:
  name: poultryguard-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poultryguard-frontend
  template:
    metadata:
      labels:
        app: poultryguard-frontend
    spec:
      containers:
      - name: frontend
        image: poultryguard-frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: poultryguard-frontend
  ports:
    port: 80
    targetPort: 80
  type: LoadBalancer
